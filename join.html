<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join a wdyw? session</title>
  <meta name="description" content="Your friend invited you to decide where to eat together on wdyw?" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --flame: #FF4E2A;
      --ember: #FF8C00;
      --char: #1C0D00;
      --smoke: #2D1A08;
      --cream: #FFF4EE;
      --dim: #7A5C4A;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--char);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--flame), var(--ember));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .invite-text {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      color: var(--dim);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .code-box {
      background: var(--smoke);
      border: 2px dashed var(--flame);
      border-radius: 16px;
      padding: 24px 40px;
      margin-bottom: 32px;
    }
    .code-box span {
      font-size: 36px;
      font-weight: 800;
      color: var(--flame);
      letter-spacing: 8px;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(90deg, var(--flame), var(--ember));
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 32px;
      font-size: 17px;
      font-weight: 700;
      transition: opacity 0.2s, transform 0.2s;
      margin-bottom: 16px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--cream);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 32px;
      font-size: 15px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1);
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .hint {
      font-size: 13px;
      color: var(--dim);
      margin-top: 24px;
      line-height: 1.5;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="logo">wdyw?</div>
  <p class="invite-text">You've been invited to swipe together!</p>
  <p class="subtitle">Find restaurants you both love — like Tinder, but for food.</p>

  <div class="code-box" id="code-box">
    <span id="code-display">------</span>
  </div>

  <a href="#" class="btn-primary" id="download-btn">
    <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
    Download wdyw? on iOS
  </a>
  <a href="/" class="btn-secondary">Learn More</a>

  <p class="hint" id="hint">Your session code has been saved. After installing, the code will be ready to use.</p>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');

      // Also support /join/CODE path
      var pathMatch = window.location.pathname.match(/\/join\/([A-Za-z0-9]+)/);
      if (!code && pathMatch) code = pathMatch[1];

      if (code) {
        code = code.toUpperCase();
        document.getElementById('code-display').textContent = code;
        // Remember code for after install
        try { localStorage.setItem('wdyw_join_code', code); } catch(e) {}
        // Try to open the app directly
        window.location = 'wdyw://join/' + code;
      } else {
        document.getElementById('code-box').classList.add('hidden');
        document.getElementById('hint').classList.add('hidden');
      }
    })();
  </script>
</body>
</html>
